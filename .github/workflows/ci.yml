name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same workflow and ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check, Test and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.1.0
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run screenshot tests
        run: pnpm run test:e2e

      - name: Build and preview
        run: |
          pnpm run preview > preview.log 2>&1 &
          PREVIEW_PID=$!
          echo "Preview server started with PID: $PREVIEW_PID"
          SERVER_UP=false
          for i in $(seq 1 60); do
            sleep 1
            echo "Health check attempt $i/60..."
            if curl -sf http://localhost:8787 > /dev/null 2>&1; then
              SERVER_UP=true
              echo "Server is up!"
              break
            fi
            if ! kill -0 $PREVIEW_PID 2>/dev/null; then
              echo "Preview process died unexpectedly"
              cat preview.log
              exit 1
            fi
          done
          kill $PREVIEW_PID 2>/dev/null || true
          wait $PREVIEW_PID 2>/dev/null || true
          echo "--- Preview log ---"
          cat preview.log
          if [ "$SERVER_UP" = "false" ]; then
            echo "Server did not respond within 60 seconds"
            exit 1
          fi